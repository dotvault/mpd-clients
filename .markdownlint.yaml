## MD013/line-length: https://github.com/DavidAnson/markdownlint/blob/main/doc/md013.md
MD013:
  # Number of characters
  line_length: 300
  # Number of characters for headings
  heading_line_length: 80
  # Number of characters for code blocks
  code_block_line_length: 120
  # Include code blocks
  code_blocks: true
  # Include tables
  tables: true
  # Include headings
  headings: true
  # Strict length checking
  strict: false
  # Stern length checking
  stern: false


## MD033/no-inline-html: https://github.com/DavidAnson/markdownlint/blob/main/doc/md033.md
MD033:
  # Allowed elements
  allowed_elements: [
    a, div, img, br, p, h1
  ]
